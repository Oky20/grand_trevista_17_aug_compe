<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Connecting Strava...</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/scoring.js"></script>
<script src="js/api.js"></script>
<style>
  :root{--bg:#111116;--card:#1c1c25;--border:#2a2a38;--border2:#333345;--text:#f0f0f5;--muted:#888899;--dim:#555566;--orange:#FC5200;--accent2:#e24b4a;--r:8px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .card{background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:48px 40px;max-width:440px;width:90%;text-align:center;}
  .logo{font-size:16px;font-weight:600;color:var(--text);letter-spacing:.5px;margin-bottom:32px;font-family:'JetBrains Mono',monospace;}
  .spin{width:44px;height:44px;border:2px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 20px;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .status{font-size:14px;color:var(--muted);}
  .big-icon{font-size:52px;margin-bottom:16px;}
  .title{font-size:22px;font-weight:600;margin-bottom:8px;}
  .subtitle{font-size:14px;color:var(--muted);line-height:1.6;}
  .error-box{background:rgba(226,75,74,.08);border:0.5px solid rgba(226,75,74,.3);border-radius:var(--r);padding:14px 16px;margin-top:16px;font-size:12px;color:var(--accent2);text-align:left;font-family:'JetBrains Mono',monospace;line-height:1.6;}
  .team-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(252,82,0,.1);border:0.5px solid rgba(252,82,0,.3);border-radius:20px;padding:6px 16px;font-size:14px;font-weight:500;color:var(--orange);margin:12px 0;}
  .back-link{display:inline-block;margin-top:24px;color:var(--orange);font-size:13px;text-decoration:none;}
  .back-link:hover{text-decoration:underline;}
  .athlete-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border-radius:var(--r);padding:12px 14px;margin:16px 0;text-align:left;}
  .athlete-row img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;}
  .athlete-name{font-weight:500;font-size:14px;}
  .athlete-meta{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">GTR FEST 17</div>
  <div class="spin"></div>
  <div class="status" id="status">Verifying registration...</div>
</div>

<script>
async function main() {
  const params   = new URLSearchParams(window.location.search);
  const code     = params.get('code');
  const errParam = params.get('error');

  if (errParam || !code) {
    return showError('Strava authorization was denied or cancelled.', errParam || 'No code received.');
  }

  try {
    setStatus('Verifying registration...');

    // Exchange code — Edge Function handles whitelist check + team assignment
    let tokenData;
    try {
      tokenData = await Strava.exchangeCode(code);
    } catch(err) {
      let parsed = null;
      try { parsed = JSON.parse(err.message); } catch(_) {}
      if (parsed?.error === 'not_whitelisted') {
        return showNotWhitelisted(parsed.athlete);
      }
      throw err;
    }

    const athlete = tokenData.athlete;

    // Save session — member already saved with correct team by Edge Function
    Session.set(athlete);

    setStatus('Almost done...');

    // Auto sync in background
    Strava.fetchActivities(athlete.id).catch(console.error);

    showSuccess(athlete, tokenData.team_id);

  } catch(err) {
    console.error(err);
    showError('Something went wrong during authentication.', err.message);
  }
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function showError(msg, detail) {
  document.getElementById('card').innerHTML = `
    <div class="logo">GTR FEST 17</div>
    <div class="big-icon">❌</div>
    <div class="title" style="color:var(--accent2)">Oops!</div>
    <div class="subtitle">${msg}</div>
    ${detail ? `<div class="error-box">${detail}</div>` : ''}
    <a class="back-link" href="index.html">← Back to leaderboard</a>
  `;
}

function showNotWhitelisted(athlete) {
  const name = athlete?.name || 'You';
  document.getElementById('card').innerHTML = `
    <div class="logo">GTR FEST 17</div>
    <div class="big-icon">🚫</div>
    <div class="title" style="color:var(--accent2)">Not Registered</div>
    <div class="subtitle">${name}, your Strava account is not registered for this challenge.</div>
    <div class="error-box">
      Strava ID: ${athlete?.id || 'unknown'}<br/>
      Please contact the organizer to register.
    </div>
    <a class="back-link" href="index.html">← Back to leaderboard</a>
  `;
}

function showSuccess(athlete, teamId) {
  const team = CONFIG.TEAMS.find(t => t.id === teamId);
  const teamName = team ? `${team.emoji} ${team.name}` : 'your team';
  const teamColor = team?.color || 'var(--orange)';

  document.getElementById('card').innerHTML = `
    <div class="logo">GTR FEST 17</div>
    <div class="big-icon">🎉</div>
    <div class="title">You're in!</div>
    <div class="athlete-row">
      <img src="${athlete.profile_medium || ''}" alt="" onerror="this.style.display='none'"/>
      <div>
        <div class="athlete-name">${athlete.firstname} ${athlete.lastname}</div>
        <div class="athlete-meta">Strava ID #${athlete.id}</div>
      </div>
    </div>
    <div class="team-badge" style="color:${teamColor};border-color:${teamColor}30;background:${teamColor}15;">
      ${teamName}
    </div>
    <div class="subtitle" style="margin-top:8px;font-size:13px;">Syncing your activities...</div>
    <a class="back-link" href="index.html">View Leaderboard →</a>
  `;

  setTimeout(() => { window.location.href = 'index.html'; }, 3000);
}

main();
</script>
</body>
</html>
